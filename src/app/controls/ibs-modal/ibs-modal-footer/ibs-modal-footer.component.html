<div class="ibs-modal-foot">
  <ng-content></ng-content>

  @if (showClose) {
    <button class="btn ghost ibs-btn-close" type="button" (click)="closed.emit()">
      {{ closeText }}
    </button>
  }

  @if (showSave) {
    <button class="ibs-action-btn ibs-btn-save" type="button" (click)="saved.emit()" [disabled]="saveDisabled">
      <i class="bi bi-floppy"></i>
      <span class="d-none d-sm-inline">{{ saveText }}</span>
    </button>
  }
</div>
