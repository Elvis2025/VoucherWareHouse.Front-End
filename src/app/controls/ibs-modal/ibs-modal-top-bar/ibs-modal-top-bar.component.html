<div class="d-flex justify-content-between align-items-center gap-3 px-3 py-2 border-bottom bg-light ibs-modal-topbar">
  <div class="topbar-left d-flex align-items-center gap-2 flex-grow-1">
    @if (showSearch) {
      <div class="input-group ibs-search">
        <span class="input-group-text">
          <i class="bi bi-search"></i>
        </span>

        <input
          class="form-control ibs-search-input"
          [placeholder]="searchPlaceholder"
          [value]="searchValue"
          (input)="searchChanged.emit($any($event.target).value)"
        />

        @if (searchValue) {
          <button
            type="button"
            class="btn btn-outline-secondary ibs-search-clear"
            (click)="cleared.emit()"
            title="Limpiar">
            <i class="bi bi-x-lg"></i>
          </button>
        }
      </div>
    }

    <ng-content></ng-content>
  </div>

  @if (showRefresh) {
    <button
      class="btn btn-primary ibs-btn-save"
      type="button"
      (click)="refreshed.emit()"
      [disabled]="refreshDisabled">
      <i class="bi bi-arrow-clockwise me-1"></i>
      <span class="d-none d-sm-inline">Refrescar</span>
    </button>
  }
</div>
