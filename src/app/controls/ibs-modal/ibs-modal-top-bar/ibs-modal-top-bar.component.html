<div class="ibs-modal-topbar">
  <div class="topbar-left d-flex align-items-center gap-2 flex-grow-1">
    @if (showSearch) {
      <div class="ibs-search">
        <i class="bi bi-search"></i>

        <input
          class="ibs-search-input"
          [placeholder]="searchPlaceholder"
          [value]="searchValue"
          (input)="searchChanged.emit($any($event.target).value)"
        />

        @if (searchValue) {
          <button
            type="button"
            class="ibs-search-clear"
            (click)="cleared.emit()"
            title="Limpiar">
            <i class="bi bi-x-lg"></i>
          </button>
        }
      </div>
    }

    <ng-content></ng-content>
  </div>

  @if (showRefresh) {
    <button
      class="ibs-action-btn ibs-refresh"
      type="button"
      (click)="refreshed.emit()"
      [disabled]="refreshDisabled">
      <i class="bi bi-arrow-clockwise me-1"></i>
      <span class="d-none d-sm-inline">Refrescar</span>
    </button>
  }
</div>
