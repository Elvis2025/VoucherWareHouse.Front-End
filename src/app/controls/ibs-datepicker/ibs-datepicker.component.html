<!-- ibs-datepicker.component.html -->
<p-floatlabel [variant]="variant" class="mt-sm-1">
  <p-datepicker
    [(ngModel)]="value"
    (ngModelChange)="onModelChange($event)"
    (onBlur)="onBlur()"
    [showClear]="true"
    [showIcon]="showIcon"
    [iconDisplay]="iconDisplay"
    [inputStyleClass]="inputStyleClass"
    [styleClass]="styleClass"
    [appendTo]="appendTo"
    [dateFormat]="dateFormat"
    [disabled]="disabled">
  </p-datepicker>

  <label>{{ label }}</label>
</p-floatlabel>
