<div
  class="ibs-field"
  [class.is-focused]="focused()"
  [class.is-disabled]="disabled"
  [class.is-error]="error"
  [class.has-value]="hasValue()"
>
  <div class="ibs-control" (click)="focus()">
    <textarea
      #textareaEl
      class="ibs-textarea"
      [id]="id"
      [attr.name]="name || null"
      [attr.placeholder]="placeholder || null"
      [required]="required || null"
      [disabled]="disabled || null"
      [readonly]="readonly || null"
      [rows]="rows"
      [attr.minlength]="minLength ?? null"
      [attr.maxlength]="maxLength ?? null"
      [attr.autocomplete]="autocomplete || 'off'"
      [attr.aria-label]="ariaLabel || label || null"
      [spellcheck]="spellcheck"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    ></textarea>

    <label class="ibs-label" [for]="id">
      {{ label }}
      @if (required) {
        <span class="ibs-required">*</span>
      }
    </label>

    <div class="ibs-actions" aria-hidden="true">
      @if (showClear) {
        <button
          type="button"
          class="ibs-clear"
          (mousedown)="$event.preventDefault()"
          (click)="clear()"
          [attr.aria-label]="'Limpiar ' + label"
        >
          <i class="bi bi-x"></i>
        </button>
      }
    </div>
  </div>

  @if (showHelper()) {
    <div
      class="ibs-meta"
      [class.is-invalid]="currentLengthState() === 'invalid'"
      [class.is-valid]="currentLengthState() === 'valid'"
    >
      <span class="ibs-hint">
        {{ helperText() }}
      </span>

      <span class="ibs-count">
        {{ charCount() }}
        @if (maxLength != null) {
          <span>/{{ maxLength }}</span>
        }
      </span>
    </div>
  }
</div>
