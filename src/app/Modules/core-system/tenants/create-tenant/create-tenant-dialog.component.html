<form
  class="form-horizontal ibs-create-tenant-form"
  autocomplete="off"
  #createTenantForm="ngForm"
  (ngSubmit)="submit()">

  <app-ibs-modal-shell [wide]="false" (cancelled)="close()">

    <app-ibs-modal-header
      [title]="'CreateNewTenant' | localize"
      (closed)="close()">
    </app-ibs-modal-header>

    <app-ibs-modal-body>

      <app-ibs-modal-tabs>

        <!-- TAB 1: DETAILS -->
        <app-ibs-modal-tab
          [label]="'Details' | localize"
          icon="bi bi-building">

          <div class="ibs-edit-user-section">

            <div class="ibs-fields-stack">

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'TenancyName' | localize"
                  name="tenancyName"
                  [required]="true"
                  [minLength]="2"
                  [maxLength]="64"
                  [ngModel]="formState().tenancyName"
                  (ngModelChange)="updateTenancyName($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'Name' | localize"
                  name="name"
                  [required]="true"
                  [maxLength]="128"
                  [ngModel]="formState().name"
                  (ngModelChange)="updateName($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'DatabaseConnectionString' | localize"
                  name="connectionString"
                  [maxLength]="1024"
                  [ngModel]="formState().connectionString"
                  (ngModelChange)="updateConnectionString($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'AdminEmailAddress' | localize"
                  type="email"
                  name="adminEmailAddress"
                  [required]="true"
                  [maxLength]="256"
                  [ngModel]="formState().adminEmailAddress"
                  (ngModelChange)="updateAdminEmailAddress($event)">
                </app-ibs-input>
              </div>

            </div>

            <div class="ibs-toggle-row">
              <app-ibs-check-box
                [text]="'IsActive' | localize"
                name="isActive"
                [ngModel]="formState().isActive"
                (ngModelChange)="updateIsActive($event)">
              </app-ibs-check-box>
            </div>

            <div class="ibs-info-block">
              <p class="ibs-info-text">
                {{ 'DefaultPasswordIs' | localize: '123qwe' }}
              </p>
            </div>

          </div>

        </app-ibs-modal-tab>

        <!-- TAB 2: LOGO / BRANDING -->
        <app-ibs-modal-tab
          [label]="'Cargar Logo'"
          icon="bi bi-image">

          <div class="ibs-edit-user-section">

            <div class="ibs-fields-stack">

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'CompanyName' | localize"
                  name="companyName"
                  [required]="true"
                  [maxLength]="500"
                  [ngModel]="brandingCompanyName()"
                  (ngModelChange)="updateBrandingCompanyName($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'CompanyDescription' | localize"
                  name="companyDescription"
                  [required]="true"
                  [maxLength]="500"
                  [ngModel]="brandingCompanyDescription()"
                  (ngModelChange)="updateBrandingCompanyDescription($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'CompanyType' | localize"
                  name="companyType"
                  [required]="true"
                  [maxLength]="500"
                  [ngModel]="brandingCompanyType()"
                  (ngModelChange)="updateBrandingCompanyType($event)">
                </app-ibs-input>
              </div>

              <!-- LOGO OPCIONAL -->
              <div class="ibs-field">
                <label class="ibs-logo-label" for="tenantLogoFile">
                  Seleccionar archivo
                </label>

                <div
                  class="ibs-logo-dropzone"
                  [class.is-dragging]="isDraggingLogo()"
                  [class.has-file]="!!selectedLogoFileName()"
                  (dragover)="onLogoDragOver($event)"
                  (dragleave)="onLogoDragLeave($event)"
                  (drop)="onLogoDrop($event)"
                  (click)="tenantLogoFileInput.click()">

                  <input
                    #tenantLogoFileInput
                    id="tenantLogoFile"
                    type="file"
                    class="ibs-logo-file-input-hidden"
                    accept=".png,.jpg,.jpeg,.webp,.svg,image/*"
                    (change)="onLogoSelected($event)"
                    [disabled]="saving()" />

                  <div class="ibs-logo-dropzone-content">
                    <div class="ibs-logo-dropzone-icon">
                      <i class="bi bi-cloud-arrow-up"></i>
                    </div>

                    <div class="ibs-logo-dropzone-texts">
                      <div class="ibs-logo-dropzone-title">
                        Arrastra tu logo aquí
                      </div>

                      <div class="ibs-logo-dropzone-subtitle">
                        o haz clic para seleccionarlo desde tu equipo
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              @if (selectedLogoFileName()) {
                <div class="ibs-logo-file-row">
                  <div class="ibs-logo-file-name">
                    <i class="bi bi-paperclip"></i>
                    <span>{{ selectedLogoFileName() }}</span>
                  </div>

                  <button
                    type="button"
                    class="ibs-logo-remove-btn"
                    (click)="clearSelectedLogo(); $event.stopPropagation()"
                    [disabled]="saving()">
                    <i class="bi bi-trash"></i>
                    <span>Quitar</span>
                  </button>
                </div>
              }

              @if (logoPreviewUrl()) {
                <div class="ibs-logo-preview-wrap">
                  <div class="ibs-logo-preview-box">
                    <img
                      [src]="logoPreviewUrl() || ''"
                      alt="Vista previa del logo"
                      class="ibs-logo-preview-img" />
                  </div>
                </div>
              }

              <div class="ibs-info-block">
                <p class="ibs-info-text">
                  Formatos permitidos: PNG, JPG, JPEG, WEBP y SVG. Tamaño máximo: 2 MB.
                </p>
              </div>

            </div>

          </div>

        </app-ibs-modal-tab>

      </app-ibs-modal-tabs>

    </app-ibs-modal-body>

    <app-ibs-modal-footer
      [closeText]="'Cancel' | localize"
      [saveText]="'Save' | localize"
      [saveDisabled]="!canSubmit() || saving()"
      (closed)="close()"
      (saved)="submit()">
    </app-ibs-modal-footer>

  </app-ibs-modal-shell>
</form>
