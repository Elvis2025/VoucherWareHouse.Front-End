<form
  class="form-horizontal ibs-edit-role-form"
  autocomplete="off"
  #editRoleForm="ngForm"
  (ngSubmit)="submit()">

  <app-ibs-modal-shell [wide]="false" (cancelled)="close()">

    <app-ibs-modal-header
      [title]="'Editar Rol' | localize"
      (closed)="close()">
    </app-ibs-modal-header>

    <app-ibs-modal-body>
         <div class="ibs-edit-user-section">
            <div class="ibs-fields-stack">

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'Name' | localize"
                  name="name"
                  [required]="true"
                  [minLength]="2"
                  [maxLength]="32"
                  [ngModel]="formState().name"
                  (ngModelChange)="updateName($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'DisplayName' | localize"
                  name="displayName"
                  [required]="true"
                  [minLength]="2"
                  [maxLength]="32"
                  [ngModel]="formState().displayName"
                  (ngModelChange)="updateDisplayName($event)">
                </app-ibs-input>
              </div>

              <div class="ibs-field">
                <app-ibs-input
                  [label]="'RoleDescription' | localize"
                  name="description"
                  [ngModel]="formState().description"
                  (ngModelChange)="updateDescription($event)">
                </app-ibs-input>
              </div>

            </div>
          </div>
    </app-ibs-modal-body>

    <app-ibs-modal-footer
      [closeText]="'Cancel' | localize"
      [saveText]="'Save' | localize"
      [saveDisabled]="!canSubmit() || saving()"
      (closed)="close()"
      (saved)="submit()">
    </app-ibs-modal-footer>

  </app-ibs-modal-shell>
</form>
