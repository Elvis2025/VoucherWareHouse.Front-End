<form
  class="form-horizontal ibs-reset-password-form"
  autocomplete="off"
  #resetPasswordForm="ngForm"
  (ngSubmit)="submit()">

  <app-ibs-modal-shell [wide]="false" (cancelled)="close()">

    <app-ibs-modal-header
      [title]="'ResetPassword' | localize"
      (closed)="close()">
    </app-ibs-modal-header>

    <app-ibs-modal-body>

      <div class="ibs-edit-user-section">

        <div class="ibs-info-block">
          <p class="ibs-info-text">
            {{ 'ResetPasswordStepOneInfo' | localize }}
          </p>
        </div>

        <div class="ibs-fields-stack">
          <div class="ibs-field">
            <app-ibs-input
              [label]="'AdminPassword' | localize"
              type="password"
              name="adminPassword"
              [required]="true"
              [ngModel]="formState().adminPassword"
              (ngModelChange)="updateAdminPassword($event)">
            </app-ibs-input>
          </div>
        </div>

        <div class="ibs-info-block">
          <p class="ibs-info-text">
            {{ 'ResetPasswordStepTwoInfo' | localize }}
          </p>
        </div>

        <div class="ibs-fields-stack">
          <div class="ibs-field">
            <app-ibs-input
              [label]="'NewPassword' | localize"
              type="text"
              name="newPassword"
              [readonly]="true"
              [ngModel]="formState().newPassword">
            </app-ibs-input>
          </div>
        </div>

      </div>

    </app-ibs-modal-body>

    <app-ibs-modal-footer
      [closeText]="'Cancel' | localize"
      [saveText]="'Save' | localize"
      [saveDisabled]="!canSubmit() || isLoading()"
      (closed)="close()"
      (saved)="submit()">
    </app-ibs-modal-footer>

  </app-ibs-modal-shell>
</form>
