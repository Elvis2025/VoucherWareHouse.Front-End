<form
  class="form-horizontal ibs-change-password-form"
  autocomplete="off"
  #changePasswordForm="ngForm"
  (ngSubmit)="submit()">

  <app-ibs-modal-shell [wide]="false" (cancelled)="close()">

    <app-ibs-modal-header
      [title]="'Cambiar contraseña' | localize"
      (closed)="close()">
    </app-ibs-modal-header>

    <app-ibs-modal-body>

      <div class="ibs-edit-user-section">
        <div class="ibs-fields-stack">

          <div class="ibs-field">
            <app-ibs-input
              [label]="'CurrentPassword' | localize"
              type="password"
              name="currentPassword"
              [required]="true"
              [ngModel]="formState().currentPassword"
              (ngModelChange)="updateCurrentPassword($event)">
            </app-ibs-input>
          </div>

          <div class="ibs-field">
            <app-ibs-input
              [label]="'NewPassword' | localize"
              type="password"
              name="newPassword"
              [required]="true"
              [ngModel]="formState().newPassword"
              (ngModelChange)="updateNewPassword($event)">
            </app-ibs-input>
          </div>

          <div class="ibs-field">
            <app-ibs-input
              [label]="'ConfirmNewPassword' | localize"
              type="password"
              name="confirmNewPassword"
              [required]="true"
              [ngModel]="formState().confirmNewPassword"
              (ngModelChange)="updateConfirmPassword($event)">
            </app-ibs-input>
          </div>

        </div>
      </div>

    </app-ibs-modal-body>

    <app-ibs-modal-footer
      [closeText]="'Cancel' | localize"
      [saveText]="'Save' | localize"
      [saveDisabled]="!canSubmit() || saving()"
      (closed)="close()"
      (saved)="submit()">
    </app-ibs-modal-footer>

  </app-ibs-modal-shell>
</form>
