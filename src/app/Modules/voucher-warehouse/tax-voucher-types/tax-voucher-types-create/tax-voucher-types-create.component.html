<app-ibs-modal-shell [wide]="false" (cancelled)="bsModalRef.hide()">

  <app-ibs-modal-header
    [title]="'Crear nueva autenticacion para el Api de facturacion electronica' | localize"
    (closed)="bsModalRef.hide()">
  </app-ibs-modal-header>

  <app-ibs-modal-body>
    <div class="ibs-fields-stack">
            <div class="ibs-field">
              <app-ibs-input
                [label]="'Codigo del comprobante Ej: E31'"
                name="lblcode"
                [required]="true"
                [maxLength]="64"
                [(ngModel)]="taxVoucherCreate.code">
              </app-ibs-input>
            </div>

            <div class="ibs-field">
              <app-ibs-input
                [label]="'Descripcion del comprobante (Ej: Factura de crédito fiscal )'"
                name="lbldescription"
                [required]="true"
                [maxLength]="2000"
                [minLength]="1"
                [(ngModel)]="taxVoucherCreate.description">
              </app-ibs-input>
            </div>

      

            
            <div class="ibs-field">
              <app-ibs-input
                [label]="'Formato del comprobante (Ej: E310000000000)'"
                name="lblformat"
                [required]="true"
                [minLength]="2"
                [maxLength]="256"
                [(ngModel)]="taxVoucherCreate.format">
              </app-ibs-input>
            </div>


            <div class="ibs-field">
              <app-ibs-input
                [label]="'Longitud del comprobante (Ej: E31 + 0000000000 = 12 caractres)'"
                name="lbltxl"
                [required]="true"
                [maxLength]="256"
                type="number"
                [(ngModel)]="taxVoucherCreate.taxVoucherLenght">
              </app-ibs-input>
            </div>

            <app-ibs-check-box
              [text]="'¿Esta activo?' | localize"
              name="isActive"
              [(ngModel)]="taxVoucherCreate.isActive">
            </app-ibs-check-box>
    
    </div>

        
   

  </app-ibs-modal-body>

  <app-ibs-modal-footer
    [closeText]="'Cancel' | localize"
    [saveText]="'Save' | localize"
    (closed)="bsModalRef.hide()"
    (saved)="save()">
  </app-ibs-modal-footer>

</app-ibs-modal-shell>
