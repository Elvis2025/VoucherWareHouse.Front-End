<ng-template #activeTpl let-u>
  <span class="badge" [class.bg-success]="u.isActive" [class.bg-secondary]="!u.isActive">
    {{ u.isActive ? 'Sí' : 'No' }}
  </span>
</ng-template>

<ng-template #nameTpl let-u>
  {{ u.name }} {{ u.surname }}
</ng-template>

<app-ibs-grid 
    [title]="'Usuarios'"
    [subtitle]="'Mantenimientos de usuarios del sistema'"
    [placeholderSearch]="'Buescar...'"
    [columns]="columns()"
    [actions]="actions()"
    [createPolicy]="createPolicy"
    [load]="loadUsers"
    (create)="onCreate()">
</app-ibs-grid>
